version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: gojump_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gojump}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gojump_secure_pass}
      POSTGRES_DB: ${POSTGRES_DB:-gojump_sms}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-gojump}']
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gojump_server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gojump}:${POSTGRES_PASSWORD:-gojump_secure_pass}@db:5432/${POSTGRES_DB:-gojump_sms}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env file}
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-development}
      SMTP_HOST: ${SMTP_HOST:-smtp.mailtrap.io}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      FROM_EMAIL: ${FROM_EMAIL:-sms@gojumpamerica.com}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:4000}
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/public:/app/public
    ports:
      - '4000:4000'

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: gojump_client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:4000/api}
      REACT_APP_PUBLIC_URL: ${PUBLIC_BASE_URL:-http://localhost:4000}
    ports:
      - '3000:80'

volumes:
  pgdata:
